# ClawDen Docker Compose
#
# Quick start:
#   cp .env.example .env        # add provider keys and optional channel tokens
#   docker compose up openclaw  # or: docker compose up zeroclaw
#
# CLI-managed mode (config translation, channel tokens, allowed-users):
#   CLAWDEN_USE_CLI=1 docker compose up zeroclaw
#
# Build from source (instead of pulling from registry):
#   docker compose build openclaw
#   docker compose up openclaw

services:
  openclaw:
    image: ghcr.io/codervisor/openclaw:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: openclaw
    ports:
      - "18789:18789"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - CLAWDEN_USE_CLI=${CLAWDEN_USE_CLI:-0}
      - CLAWDEN_CHANNELS=${CLAWDEN_CHANNELS:-}
      - CLAWDEN_ALLOWED_USERS=${CLAWDEN_ALLOWED_USERS:-}
      - CLAWDEN_LLM_API_KEY=${CLAWDEN_LLM_API_KEY:-}
    volumes:
      - workspace:/home/clawden/workspace
    restart: unless-stopped

  zeroclaw:
    image: ghcr.io/codervisor/zeroclaw:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: zeroclaw
    ports:
      - "42617:42617"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - CLAWDEN_USE_CLI=${CLAWDEN_USE_CLI:-0}
      - CLAWDEN_CHANNELS=${CLAWDEN_CHANNELS:-}
      - CLAWDEN_ALLOWED_USERS=${CLAWDEN_ALLOWED_USERS:-}
      - CLAWDEN_LLM_API_KEY=${CLAWDEN_LLM_API_KEY:-}
    volumes:
      - workspace:/home/clawden/workspace
    restart: unless-stopped

volumes:
  workspace:
