# ClawDen Docker Compose
#
# Quick start:
#   cp .env.example .env        # add provider keys and optional channel tokens
#   docker compose up openclaw  # or: docker compose up zeroclaw
#
# CLI-managed mode (config translation, channel tokens, allowed-users):
#   CLAWDEN_USE_CLI=1 docker compose up zeroclaw
#
# Build from source (instead of pulling from registry):
#   docker compose build openclaw
#   docker compose up openclaw

services:
  openclaw:
    image: ghcr.io/codervisor/openclaw:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: openclaw
    ports:
      - "18789:18789"
    env_file: .env
    volumes:
      - workspace:/home/clawden/workspace
    restart: unless-stopped

  zeroclaw:
    image: ghcr.io/codervisor/zeroclaw:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: zeroclaw
    ports:
      - "42617:42617"
    env_file: .env
    volumes:
      - workspace:/home/clawden/workspace
    restart: unless-stopped

volumes:
  workspace:
