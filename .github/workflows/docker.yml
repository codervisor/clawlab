name: Build & Push ClawDen Docker Image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant to build (`preview` builds the default openclaw image only)"
        required: false
        default: "preview"
        type: choice
        options:
          - preview
          - all
          - openclaw
          - zeroclaw
          - openclaw-browser
          - zeroclaw-browser
          - openclaw-computer
          - zeroclaw-computer
      include_arm64:
        description: "Also build linux/arm64"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: codervisor/clawden

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: openclaw
          - target: zeroclaw
          - target: openclaw-browser
          - target: zeroclaw-browser
          - target: openclaw-computer
          - target: zeroclaw-computer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        if: github.event_name == 'workflow_dispatch' && inputs.include_arm64
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "version=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose image tags
        id: tags
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAGS=""
          TARGET="${{ matrix.target }}"

          add_tag() {
            local tag="$1"
            [ -n "$TAGS" ] && TAGS+=$'\n'
            TAGS+="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "$TARGET" = "openclaw" ]; then
              add_tag "$VERSION"
              add_tag "stable"
              add_tag "latest"
              add_tag "openclaw"
            else
              add_tag "${VERSION}-${TARGET}"
              add_tag "$TARGET"
            fi
          else
            if [ "$TARGET" = "openclaw" ]; then
              add_tag "$VERSION"
              add_tag "${VERSION}-openclaw"
            else
              add_tag "${VERSION}-${TARGET}"
            fi
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Select build platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_arm64 }}" = "true" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, smoke test, and push
        if: >-
          (github.event_name == 'push' && matrix.target == 'openclaw') ||
          (github.event_name == 'workflow_dispatch' && (
            inputs.variant == 'all' ||
            (inputs.variant == 'preview' && matrix.target == 'openclaw') ||
            inputs.variant == matrix.target
          ))
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: ${{ steps.platforms.outputs.platforms }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
