name: Build & Push ClawDen Docker Image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. latest, 0.2.0)"
        required: false
        default: "latest"
      variant:
        description: "Variant to build (`latest` builds the default openclaw image only)"
        required: false
        default: "latest"
        type: choice
        options:
          - latest
          - all
          - openclaw
          - zeroclaw
          - openclaw-browser
          - zeroclaw-browser
          - openclaw-computer
          - zeroclaw-computer

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: codervisor/clawden

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: openclaw
            suffix: ""
            tags: "openclaw,latest"
          - target: zeroclaw
            suffix: ""
            tags: "zeroclaw"
          - target: openclaw-browser
            suffix: ""
            tags: "openclaw-browser"
          - target: zeroclaw-browser
            suffix: ""
            tags: "zeroclaw-browser"
          - target: openclaw-computer
            suffix: ""
            tags: "openclaw-computer"
          - target: zeroclaw-computer
            suffix: ""
            tags: "zeroclaw-computer"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          else
            INPUT_TAG="${{ inputs.tag }}"
            echo "version=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose image tags
        id: tags
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          IFS=',' read -ra TAG_LIST <<< "${{ matrix.tags }}"
          TAGS=""
          for tag in "${TAG_LIST[@]}"; do
            [ -n "$TAGS" ] && TAGS+=$'\n'
            TAGS+="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${tag}"
            TAGS+=$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
          done

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build, smoke test, and push
        if: >-
          (github.event_name == 'push' && matrix.target == 'openclaw') ||
          (github.event_name == 'workflow_dispatch' && (
            inputs.variant == 'all' ||
            (inputs.variant == 'latest' && matrix.target == 'openclaw') ||
            inputs.variant == matrix.target
          ))
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
