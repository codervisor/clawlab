name: Build & Push ClawDen Runtime Images

# Multi-arch builds use native runners (no QEMU emulation) for each
# platform, then merge the per-platform images into a single manifest
# list so `docker pull` works on both amd64 and arm64 hosts.

on:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Runtime target to publish"
        required: false
        default: "openclaw"
        type: choice
        options:
          - openclaw
          - openclaw-browser
          - openclaw-computer
          - zeroclaw
          - zeroclaw-browser
          - zeroclaw-computer
          - all

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: codervisor

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      build_matrix: ${{ steps.decide.outputs.build_matrix }}
      merge_matrix: ${{ steps.decide.outputs.merge_matrix }}
    steps:
      - name: Decide targets and expand platform matrix
        id: decide
        shell: bash
        run: |
          SHOULD_RUN=false
          TARGETS='[]'

          ALL_TARGETS='["openclaw","zeroclaw","openclaw-browser","zeroclaw-browser","openclaw-computer","zeroclaw-computer"]'

          if [ "${{ github.event_name }}" = "push" ]; then
            SHOULD_RUN=true
            TARGETS='["openclaw"]'
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            SHOULD_RUN=true
            TARGETS='["openclaw"]'
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN=true
            TARGET="${{ inputs.target }}"
            if [ "$TARGET" = "all" ]; then
              TARGETS="$ALL_TARGETS"
            else
              TARGETS="[\"${TARGET}\"]"
            fi
          fi

          # Cross each target with both platforms (native runners)
          BUILD_MATRIX=$(echo "$TARGETS" | jq -c '[.[] as $t |
            {target: $t, runner: "ubuntu-latest",    platform: "linux/amd64", slug: "amd64"},
            {target: $t, runner: "ubuntu-24.04-arm", platform: "linux/arm64", slug: "arm64"}
          ]')

          MERGE_MATRIX=$(echo "$TARGETS" | jq -c '[.[] | {target: .}]')

          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "merge_matrix=${MERGE_MATRIX}" >> "$GITHUB_OUTPUT"

  # Build each (target × platform) natively and push by digest.
  build:
    needs: precheck
    if: needs.precheck.outputs.should_run == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.precheck.outputs.build_matrix) }}
    steps:
      - name: Check out triggering commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check out repository
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: meta
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"

          case "$TARGET" in
            openclaw|openclaw-browser|openclaw-computer)
              REPOSITORY="openclaw"
              ;;
            zeroclaw|zeroclaw-browser|zeroclaw-computer)
              REPOSITORY="zeroclaw"
              ;;
            *)
              echo "Unknown target: $TARGET" >&2
              exit 1
              ;;
          esac

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${REPOSITORY}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ steps.meta.outputs.image }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.slug }}
          cache-to: type=gha,scope=${{ matrix.target }}-${{ matrix.slug }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target }}-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-platform digests into a multi-arch manifest list and tag it.
  merge:
    needs: [precheck, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.precheck.outputs.merge_matrix) }}
    steps:
      - name: Check out triggering commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          sparse-checkout: docker/Dockerfile

      - name: Check out repository
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4
        with:
          sparse-checkout: docker/Dockerfile

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.target }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: meta
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"

          case "$TARGET" in
            openclaw)
              REPOSITORY="openclaw"
              VERSION_ARG="OPENCLAW_VERSION"
              IMMUTABLE_SUFFIX=""
              MOVING_ALIAS="latest"
              ;;
            openclaw-browser)
              REPOSITORY="openclaw"
              VERSION_ARG="OPENCLAW_VERSION"
              IMMUTABLE_SUFFIX="-browser"
              MOVING_ALIAS="browser"
              ;;
            openclaw-computer)
              REPOSITORY="openclaw"
              VERSION_ARG="OPENCLAW_VERSION"
              IMMUTABLE_SUFFIX="-computer"
              MOVING_ALIAS="computer"
              ;;
            zeroclaw)
              REPOSITORY="zeroclaw"
              VERSION_ARG="ZEROCLAW_VERSION"
              IMMUTABLE_SUFFIX=""
              MOVING_ALIAS="latest"
              ;;
            zeroclaw-browser)
              REPOSITORY="zeroclaw"
              VERSION_ARG="ZEROCLAW_VERSION"
              IMMUTABLE_SUFFIX="-browser"
              MOVING_ALIAS="browser"
              ;;
            zeroclaw-computer)
              REPOSITORY="zeroclaw"
              VERSION_ARG="ZEROCLAW_VERSION"
              IMMUTABLE_SUFFIX="-computer"
              MOVING_ALIAS="computer"
              ;;
            *)
              echo "Unknown target: $TARGET" >&2
              exit 1
              ;;
          esac

          VERSION="$(sed -n "s/^ARG ${VERSION_ARG}=//p" docker/Dockerfile | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "Failed to extract ${VERSION_ARG} from docker/Dockerfile" >&2
            exit 1
          fi

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${REPOSITORY}"
          IMMUTABLE_TAG="${IMAGE}:${VERSION}${IMMUTABLE_SUFFIX}"

          if [ "${{ github.event_name }}" = "push" ]; then
            TAGS="${IMMUTABLE_TAG}"
            TAGS+=$'\n'"${IMAGE}:${MOVING_ALIAS}"
          else
            TAGS="${IMAGE}:preview${IMMUTABLE_SUFFIX}"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          TAGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS+=" -t ${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"

          docker buildx imagetools create $TAGS \
            $(printf '${{ steps.meta.outputs.image }}@sha256:%s ' *)
